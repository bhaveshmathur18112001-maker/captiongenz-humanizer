<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CaptionGenz Humanizer</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">

<div class="hero">

<h1>CaptionGenz AI Humanizer</h1>

<p>
Transform robotic AI writing into natural,
engaging and SEO-friendly human content.
</p>

</div>

<div class="card">

<div class="section-title">
Input Content
</div>

<textarea
id="inputText"
placeholder="Paste your AI-generated content here..."
></textarea>

<select id="tone">

<option>Professional</option>

<option>Casual</option>

<option>Gen Z</option>

<option>Storytelling</option>

<option>Emotional</option>

</select>

<button id="humanizeBtn">
Humanize Content
</button>

<div class="section-title">
Humanized Output
</div>

<textarea
id="outputText"
readonly
placeholder="Your rewritten content will appear here..."
></textarea>

<button id="copyBtn">
Copy Output
</button>

<div class="stats">

<div class="stat-box">
<h3>SEO</h3>
<p>Optimized</p>
</div>

<div class="stat-box">
<h3>Human</h3>
<p>Natural Tone</p>
</div>

<div class="stat-box">
<h3>Fast</h3>
<p>AI Powered</p>
</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>



</html>
